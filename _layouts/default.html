<!DOCTYPE html>
<html lang="{{ page.lang | default: "en" }}">
  <script>
    (function () {
      try {
        var allowed = ["blue", "emerald", "burgundy"];
        var v = localStorage.getItem("bg-theme");
        if (v === "purple") {
          v = "burgundy";
          try {
            localStorage.setItem("bg-theme", "burgundy");
          } catch (e) {}
        }
        if (v === "forest") {
          v = "emerald";
          try {
            localStorage.setItem("bg-theme", "emerald");
          } catch (e) {}
        }
        var t = allowed.indexOf(v) >= 0 ? v : "blue";
        document.documentElement.setAttribute("data-bg-theme", t);
      } catch (e) {
        document.documentElement.setAttribute("data-bg-theme", "blue");
      }
    })();
  </script>
  {%- include head.html -%}
  <body a="{{ site.theme_config.appearance | default: "auto" }}">
    <div class="manuscript-layers" aria-hidden="true">
      <div class="manuscript-layers__grain"></div>
      <div class="manuscript-layers__motif" aria-hidden="true"></div>
      <div class="manuscript-layers__ezhuthani" role="presentation"></div>
      <div class="manuscript-layers__depth"></div>
      <div class="manuscript-layers__frame"></div>
      <span class="manuscript-layers__suzhi">௳</span>
      <div class="manuscript-layers__corners">
        <span class="manuscript-layers__corner manuscript-layers__corner--tl">‖ ஓம் ‖</span>
        <span class="manuscript-layers__corner manuscript-layers__corner--tr">ஸ்ரீ</span>
        <span class="manuscript-layers__corner manuscript-layers__corner--bl">வித்யை</span>
        <span class="manuscript-layers__corner manuscript-layers__corner--br">சூத்திரம்</span>
      </div>
    </div>
    <main class="page-content" aria-label="Content">
      <div class="w">
        {{ content }}
      </div>
    </main>

    <nav class="bg-theme-heritage" aria-label="Background theme">
      <div class="bg-theme-heritage__group" role="radiogroup" aria-label="Background palette">
        <label class="bg-theme-heritage__opt">
          <input class="cb" type="radio" name="bg-theme" data-bg-theme="burgundy" value="burgundy" aria-label="Temple — burgundy background" />
          <span class="bg-theme-heritage__face" title="Temple">
            <svg class="bg-theme-heritage__svg" viewBox="0 0 32 32" width="22" height="22" aria-hidden="true" focusable="false">
              <path fill="none" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round" d="M16 4 L26 10 L26 26 L6 26 L6 10 Z M10 14 h12 M8 18 h16" />
              <circle cx="16" cy="8" r="2" fill="none" stroke="currentColor" stroke-width="1" />
            </svg>
          </span>
        </label>
        <label class="bg-theme-heritage__opt">
          <input class="cb" type="radio" name="bg-theme" data-bg-theme="blue" value="blue" aria-label="Ship — blue background" checked />
          <span class="bg-theme-heritage__face" title="Ship">
            <svg class="bg-theme-heritage__svg" viewBox="0 0 32 32" width="22" height="22" aria-hidden="true" focusable="false">
              <path fill="none" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round" d="M4 20 Q10 14 16 18 T28 18 L26 24 L6 24 Z" />
              <path fill="none" stroke="currentColor" stroke-width="0.9" opacity="0.7" d="M2 22 Q8 19 14 21 T30 20" />
            </svg>
          </span>
        </label>
        <label class="bg-theme-heritage__opt">
          <input class="cb" type="radio" name="bg-theme" data-bg-theme="emerald" value="emerald" aria-label="Elephant — emerald background" />
          <span class="bg-theme-heritage__face" title="Elephant">
            <svg class="bg-theme-heritage__svg" viewBox="0 0 32 32" width="22" height="22" aria-hidden="true" focusable="false">
              <path fill="none" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round" d="M8 18 Q6 12 12 10 Q18 8 22 12 Q24 16 22 20 L20 24 L10 24 Q8 20 8 18 Z" />
              <path fill="none" stroke="currentColor" stroke-width="1" d="M20 14 Q24 12 26 14" />
              <ellipse cx="14" cy="22" rx="3" ry="2" fill="none" stroke="currentColor" stroke-width="0.8" opacity="0.6" />
            </svg>
          </span>
        </label>
      </div>
    </nav>

    <script src="{{ "/assets/js/bg-theme.js" | relative_url }}" defer></script>

    {%-if site.goat_counter and jekyll.environment == "production"-%}
      {%-include goat_counter.html-%}
    {%-endif-%}

    {% if page.custom_js %}
      {% for js_file in page.custom_js %}
        <script type="text/javascript" src="{{ site.baseurl }}/assets/js/{{ js_file }}.js"></script>
      {% endfor %}
    {% endif %}
  </body>
</html>
