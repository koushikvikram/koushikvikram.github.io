<!DOCTYPE html>
<html lang="{{ page.lang | default: "en" }}">
  <script>
    (function () {
      try {
        var allowed = ["blue", "emerald", "burgundy", "music"];
        var v = localStorage.getItem("bg-theme");
        if (v === "earth") {
          v = "music";
          try {
            localStorage.setItem("bg-theme", "music");
          } catch (e) {}
        }
        if (v === "purple") {
          v = "burgundy";
          try {
            localStorage.setItem("bg-theme", "burgundy");
          } catch (e) {}
        }
        if (v === "forest") {
          v = "emerald";
          try {
            localStorage.setItem("bg-theme", "emerald");
          } catch (e) {}
        }
        var t = allowed.indexOf(v) >= 0 ? v : "blue";
        document.documentElement.setAttribute("data-bg-theme", t);
      } catch (e) {
        document.documentElement.setAttribute("data-bg-theme", "blue");
      }
    })();
  </script>
  {%- include head.html -%}
  <body a="{{ site.theme_config.appearance | default: "auto" }}">
    <div class="manuscript-layers" id="manuscript-layers" data-turbo-permanent aria-hidden="true">
      <div class="manuscript-layers__grain" aria-hidden="true"></div>
      <div class="manuscript-layers__waves" aria-hidden="true"></div>
      <div class="manuscript-layers__motif" aria-hidden="true"></div>
      <div class="manuscript-layers__ezhuthani" role="presentation"></div>
      <div class="manuscript-layers__depth"></div>
      <div class="manuscript-layers__frame"></div>
      <span class="manuscript-layers__suzhi">வீரம்</span>
      <span class="manuscript-layers__anbu">பண்பு</span>
      <span class="manuscript-layers__mid-left">அறம்</span>
      <span class="manuscript-layers__mid-right">அன்பு</span>
      <div class="manuscript-layers__corners">
        <span class="manuscript-layers__corner manuscript-layers__corner--tl">‖ ஓம் ‖</span>
        <span class="manuscript-layers__corner manuscript-layers__corner--tr">ஸ்ரீ</span>
        <span class="manuscript-layers__corner manuscript-layers__corner--bl">வித்யை</span>
        <span class="manuscript-layers__corner manuscript-layers__corner--br">சக்தி</span>
      </div>
    </div>
    <main class="page-content" aria-label="Content">
      <div class="w">
        {{ content }}
      </div>
    </main>

    <nav class="bg-theme-heritage" id="bg-theme-nav" data-turbo-permanent aria-label="Background theme">
      <div class="bg-theme-heritage__group" role="radiogroup" aria-label="Background palette">
        <label class="bg-theme-heritage__opt">
          <input class="cb" type="radio" name="bg-theme" data-bg-theme="blue" value="blue" aria-label="Ship — blue background" checked />
          <span class="bg-theme-heritage__face" title="Ship">
            <svg class="bg-theme-heritage__svg" viewBox="0 0 32 32" width="24" height="24" aria-hidden="true" focusable="false">
              <g fill="none" stroke="currentColor" stroke-linejoin="round" stroke-linecap="round">
                <!-- Water -->
                <path d="M3 24.5c2.5-1 5-1 7.5 0s5-1 7.5 0 5-1 7.5 0 5-1 7.5 0" stroke-width="1.1" opacity="0.75" />
                <path d="M2.5 26.8c3-0.8 6-0.8 9 0s6-0.8 9 0" stroke-width="1" opacity="0.55" />
                <!-- Hull (simple sailing boat) -->
                <path d="M5.5 22.5H26.5L24 17.5H8z" stroke-width="1.35" />
                <!-- Mast & sail -->
                <line x1="16" y1="17.4" x2="16" y2="7" stroke-width="1.35" />
                <path d="M16 7l9.5 10.5H17.2L16 11.8V7z" stroke-width="1.35" />
              </g>
            </svg>
          </span>
        </label>
        <label class="bg-theme-heritage__opt">
          <input class="cb" type="radio" name="bg-theme" data-bg-theme="emerald" value="emerald" aria-label="Elephant — emerald background" />
          <span class="bg-theme-heritage__face" title="Elephant">
            <svg class="bg-theme-heritage__svg" viewBox="0 0 32 32" width="24" height="24" aria-hidden="true" focusable="false">
              <g fill="none" stroke="currentColor" stroke-linejoin="round" stroke-linecap="round">
                <!-- Body -->
                <ellipse cx="18.5" cy="18.5" rx="7.2" ry="5.2" stroke-width="1.35" />
                <!-- Head -->
                <circle cx="10.5" cy="17" r="3.6" stroke-width="1.35" />
                <!-- Trunk -->
                <path d="M7.2 18.2c-2.2 1.8-2.8 4.6-1.4 6.8 1 1.6 3 2 4.6 1" stroke-width="1.35" />
                <!-- Ear -->
                <path d="M12.5 14.5c-2.2-1.8-2.5-4.5-0.8-6.2 1.4-1.4 3.8-1.2 5.2 0.4" stroke-width="1.2" />
                <!-- Legs -->
                <line x1="13.5" y1="23.2" x2="13.5" y2="27.5" stroke-width="1.25" />
                <line x1="17.5" y1="23.2" x2="17.5" y2="27.5" stroke-width="1.25" />
                <line x1="21" y1="23.2" x2="21" y2="27.5" stroke-width="1.25" />
                <line x1="24" y1="22.5" x2="24" y2="26.8" stroke-width="1.25" />
                <!-- Tail -->
                <path d="M25.5 17.5c1.6 0.6 2.6 1.8 2.8 3.2" stroke-width="1.1" />
                <!-- Eye -->
                <circle cx="9.2" cy="16.2" r="0.65" fill="currentColor" stroke="none" />
              </g>
            </svg>
          </span>
        </label>
        <label class="bg-theme-heritage__opt">
          <input class="cb" type="radio" name="bg-theme" data-bg-theme="burgundy" value="burgundy" aria-label="Temple — burgundy background" />
          <span class="bg-theme-heritage__face" title="Temple (gopuram)">
            <svg class="bg-theme-heritage__svg" viewBox="0 0 32 32" width="24" height="24" aria-hidden="true" focusable="false">
              <g fill="none" stroke="currentColor" stroke-width="1.35" stroke-linejoin="round" stroke-linecap="round">
                <path d="M7 26h18v-2.2H7z M9 23.8h14v-2.4H9z M10.5 21.4h11v-2.3h-11z M12 19.1h8v-2h-8z M13.5 17.1h5v-2h-5z M14.8 15.1h2.4v-3h-2.4z" />
                <circle cx="16" cy="10.2" r="1.55" />
                <line x1="16" y1="11.75" x2="16" y2="15.1" />
                <path d="M11.6 26V23.3Q16 19.8 20.4 23.3V26" stroke-width="1.15" />
              </g>
            </svg>
          </span>
        </label>
        <label class="bg-theme-heritage__opt">
          <input class="cb" type="radio" name="bg-theme" data-bg-theme="music" value="music" aria-label="Music — copper background" />
          <span class="bg-theme-heritage__face" title="Copper">
            <svg class="bg-theme-heritage__svg" viewBox="0 0 32 32" width="24" height="24" aria-hidden="true" focusable="false">
              <g fill="none" stroke="currentColor" stroke-linejoin="round" stroke-linecap="round">
                <!-- Eighth note -->
                <line x1="19" y1="8.5" x2="19" y2="23" stroke-width="1.35" />
                <ellipse cx="12.8" cy="23.2" rx="5.2" ry="3.4" transform="rotate(-24 12.8 23.2)" stroke-width="1.25" />
                <path d="M19 8.5c3.2 0.8 5.5 2.8 5.5 5.2s-2 4.5-5.5 4" stroke-width="1.2" />
              </g>
            </svg>
          </span>
        </label>
      </div>
    </nav>

    <script src="{{ "/assets/js/turbo.es2017-umd.js" | relative_url }}" defer></script>
    <script src="{{ "/assets/js/page-transitions.js" | relative_url }}" defer></script>
    <script src="{{ "/assets/js/bg-theme.js" | relative_url }}" defer></script>

    {%-if site.goat_counter and jekyll.environment == "production"-%}
      {%-include goat_counter.html-%}
    {%-endif-%}

    {% if page.custom_js %}
      {% for js_file in page.custom_js %}
        <script type="text/javascript" src="{{ site.baseurl }}/assets/js/{{ js_file }}.js"></script>
      {% endfor %}
    {% endif %}
  </body>
</html>
