<!DOCTYPE html>
<html lang="{{ page.lang | default: "en" }}">
  <script>
    (function () {
      try {
        var allowed = ["blue", "burgundy", "forest"];
        var v = localStorage.getItem("bg-theme");
        if (v === "purple") {
          v = "burgundy";
          try {
            localStorage.setItem("bg-theme", "burgundy");
          } catch (e) {}
        }
        var t = allowed.indexOf(v) >= 0 ? v : "blue";
        document.documentElement.setAttribute("data-bg-theme", t);
      } catch (e) {
        document.documentElement.setAttribute("data-bg-theme", "blue");
      }
    })();
  </script>
  {%- include head.html -%}
  <body a="{{ site.theme_config.appearance | default: "auto" }}">
    <main class="page-content" aria-label="Content">
      <div class="w">
        {{ content }}
      </div>
    </main>

    <div class="bg-theme-switch" role="toolbar" aria-label="Background color">
      <div class="bg-theme-switch__shell">
        <div class="bg-theme-switch__track" aria-hidden="true">
          <span class="bg-theme-switch__thumb"></span>
        </div>
        <div class="bg-theme-switch__hits" role="group">
          <button type="button" class="bg-theme-switch__hit" data-bg-theme="blue" aria-label="Royal navy" title="Royal navy"></button>
          <button type="button" class="bg-theme-switch__hit" data-bg-theme="burgundy" aria-label="Deep burgundy" title="Deep burgundy"></button>
          <button type="button" class="bg-theme-switch__hit" data-bg-theme="forest" aria-label="Deep forest green" title="Deep forest green"></button>
        </div>
      </div>
    </div>

    <script src="{{ "/assets/js/bg-theme.js" | relative_url }}" defer></script>

    {%-if site.goat_counter and jekyll.environment == "production"-%}
      {%-include goat_counter.html-%}
    {%-endif-%}

    {% if page.custom_js %}
      {% for js_file in page.custom_js %}
        <script type="text/javascript" src="{{ site.baseurl }}/assets/js/{{ js_file }}.js"></script>
      {% endfor %}
    {% endif %}
  </body>
</html>
