<!DOCTYPE html>
<html lang="{{ page.lang | default: "en" }}">
  <script>
    (function () {
      try {
        var allowed = ["blue", "purple", "forest"];
        var v = localStorage.getItem("bg-theme");
        var t = allowed.indexOf(v) >= 0 ? v : "blue";
        document.documentElement.setAttribute("data-bg-theme", t);
      } catch (e) {
        document.documentElement.setAttribute("data-bg-theme", "blue");
      }
    })();
  </script>
  {%- include head.html -%}
  <body a="{{ site.theme_config.appearance | default: "auto" }}">
    <main class="page-content" aria-label="Content">
      <div class="w">
        {{ content }}
      </div>
    </main>

    <div class="bg-theme-toggle" role="toolbar" aria-label="Background color">
      <div class="bg-theme-toggle__rail" role="group">
        <button type="button" class="bg-theme-toggle__btn" data-bg-theme="blue" aria-label="Royal navy" title="Royal navy">
          <span class="bg-theme-toggle__swatch" aria-hidden="true"></span>
        </button>
        <button type="button" class="bg-theme-toggle__btn" data-bg-theme="purple" aria-label="Deep royal purple" title="Deep royal purple">
          <span class="bg-theme-toggle__swatch" aria-hidden="true"></span>
        </button>
        <button type="button" class="bg-theme-toggle__btn" data-bg-theme="forest" aria-label="Deep forest green" title="Deep forest green">
          <span class="bg-theme-toggle__swatch" aria-hidden="true"></span>
        </button>
      </div>
    </div>

    <script src="{{ "/assets/js/bg-theme.js" | relative_url }}" defer></script>

    {%-if site.goat_counter and jekyll.environment == "production"-%}
      {%-include goat_counter.html-%}
    {%-endif-%}

    {% if page.custom_js %}
      {% for js_file in page.custom_js %}
        <script type="text/javascript" src="{{ site.baseurl }}/assets/js/{{ js_file }}.js"></script>
      {% endfor %}
    {% endif %}
  </body>
</html>
