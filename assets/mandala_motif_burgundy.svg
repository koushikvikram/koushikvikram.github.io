    <circle r="78" stroke-opacity="0.42"/>
    <circle r="52" stroke-opacity="0.58"/>
    <circle r="26" stroke-opacity="0.76"/>
    <!-- 12 radial spokes -->
    <g stroke-opacity="0.34">
      <line x1="0" y1="-82" x2="0" y2="-58" transform="rotate(0)"/>
      <line x1="0" y1="-82" x2="0" y2="-58" transform="rotate(30)"/>
      <line x1="0" y1="-82" x2="0" y2="-58" transform="rotate(60)"/>
      <line x1="0" y1="-82" x2="0" y2="-58" transform="rotate(90)"/>
      <line x1="0" y1="-82" x2="0" y2="-58" transform="rotate(120)"/>
      <line x1="0" y1="-82" x2="0" y2="-58" transform="rotate(150)"/>
      <line x1="0" y1="-82" x2="0" y2="-58" transform="rotate(180)"/>
      <line x1="0" y1="-82" x2="0" y2="-58" transform="rotate(210)"/>
      <line x1="0" y1="-82" x2="0" y2="-58" transform="rotate(240)"/>
      <line x1="0" y1="-82" x2="0" y2="-58" transform="rotate(270)"/>
      <line x1="0" y1="-82" x2="0" y2="-58" transform="rotate(300)"/>
      <line x1="0" y1="-82" x2="0" y2="-58" transform="rotate(330)"/>
    </g>
    <!-- Small petal marks on the outer ring -->
    <g stroke-opacity="0.34">
      <path d="M0-70a4.5 4.5 0 0 1 0 9 4.5 4.5 0 0 1 0-9"/>
      <path d="M0-70a4.5 4.5 0 0 1 0 9 4.5 4.5 0 0 1 0-9" transform="rotate(30)"/>
      <path d="M0-70a4.5 4.5 0 0 1 0 9 4.5 4.5 0 0 1 0-9" transform="rotate(60)"/>
      <path d="M0-70a4.5 4.5 0 0 1 0 9 4.5 4.5 0 0 1 0-9" transform="rotate(90)"/>
      <path d="M0-70a4.5 4.5 0 0 1 0 9 4.5 4.5 0 0 1 0-9" transform="rotate(120)"/>
      <path d="M0-70a4.5 4.5 0 0 1 0 9 4.5 4.5 0 0 1 0-9" transform="rotate(150)"/>
      <path d="M0-70a4.5 4.5 0 0 1 0 9 4.5 4.5 0 0 1 0-9" transform="rotate(180)"/>
      <path d="M0-70a4.5 4.5 0 0 1 0 9 4.5 4.5 0 0 1 0-9" transform="rotate(210)"/>
      <path d="M0-70a4.5 4.5 0 0 1 0 9 4.5 4.5 0 0 1 0-9" transform="rotate(240)"/>
      <path d="M0-70a4.5 4.5 0 0 1 0 9 4.5 4.5 0 0 1 0-9" transform="rotate(270)"/>
      <path d="M0-70a4.5 4.5 0 0 1 0 9 4.5 4.5 0 0 1 0-9" transform="rotate(300)"/>
